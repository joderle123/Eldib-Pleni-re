<!DOCTYPE html>
<html lang="lb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ – ELDiB Generator (Word Download)</title>
    <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a1a1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(0,151,167,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,131,143,0.25) 0%, transparent 50%),
                linear-gradient(180deg, #0a1a1e 0%, #122a2e 50%, #0a1a1e 100%);
            z-index: -1;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #26C6DA, #4DB6AC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        p { color: #a1a1aa; margin-bottom: 24px; line-height: 1.6; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #0097A7, #00838F);
            color: white;
            border: none;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,151,167,0.4);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(0,151,167,0.5); }
        .btn:active { transform: translateY(0); }
        .done { color: #4ade80; margin-top: 16px; display: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>FAQ – ELDiB Generator</h1>
        <p>Klickt op de Knäppchen fir d'FAQ als Word-Dokument op Lëtzebuergesch erofzelueden.</p>
        <button class="btn" onclick="generateFAQ()">FAQ eroflueden (Word)</button>
        <div class="done" id="done">Download gestart!</div>
    </div>

    <script>
    async function generateFAQ() {
        const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, BorderStyle } = docx;

        const faqData = [
            {
                section: 'ZOUGANG & INSTALLATIOUN',
                items: [
                    {
                        q: 'Wou fannen ech d\'App?',
                        a: 'D\'HTML-Datei läit um gemeinsamen Netzwierk O: / CDSEall. Navigéiert zum richtegen Dossier a sicht d\'Datei „index.html" (ELDiB Generator).'
                    },
                    {
                        q: 'Wéi installéieren ech d\'App op mengem Apparat?',
                        a: 'Et gëtt keng klassesch Installatioun. Dir kopéiert einfach d\'Datei:\n\n1. Öffnet den Drive O: / CDSEall a sicht d\'HTML-Datei.\n2. Kopéiert d\'Datei „index.html" op Ären Computer (z.B. op den Desktop oder an en Dossier).\n3. Öffnet déi kopéiert Datei mat engem Duebelklick – si mécht sech an Ärem Browser op (Chrome, Edge, Firefox, asw.).\n\nDat war et. Keng weider Installatioun néideg.'
                    },
                    {
                        q: 'Firwat muss ech d\'Datei lokal späicheren?',
                        a: 'D\'App späichert Är Donnéeën am lokale Späicher (localStorage) vum Browser – dësen ass un de Späicherplaz vun der Datei gebonnen. Wann Dir d\'Datei direkt vum Netzwierk öffnet, kënnen Donnéeën verluer goen oder tëscht de Benotzer kollidéieren. Duerch dat lokalt Späicheren bleiwen Är Donnéeën sécher bei Iech.'
                    }
                ]
            },
            {
                section: 'DATESCHUTZ & SÉCHERHEET',
                items: [
                    {
                        q: 'Gi meng Donnéeën iergendwouhi geschéckt?',
                        a: 'Nee. Keng eenzeg Informatioun verléisst Ären Computer.\n\nD\'App leeft komplett lokal an Ärem Browser. Et gëtt kee Server, keng Cloud, keng Datebank am Hannergrond. All Donnéeën (Schülerdaten, Aschätzungen, Ziler) ginn ausschliisslech am lokale Späicher vum Browser gespäichert a bleiwen op Ärem Apparat.'
                    },
                    {
                        q: 'Huet d\'App eppes mat KI / Kënschtlecher Intelligenz ze dinn?',
                        a: 'Nee. D\'App huet guer keng KI-Komponent.\n\nEt handelt sech ëm e reint HTML-Formulaire mat fest hinterluechten ELDiB-Items an Zilformuléierungen. D\'App generéiert keng Texter – si setzt Är Agaben an e formatéiert Word-Dokument ëm. Keen Algorithmus decidéiert eppes – Dir wielt aus, d\'App formatéiert.'
                    },
                    {
                        q: 'Ass d\'App en zougemaachte System?',
                        a: 'Jo. D\'App ass eng eenzeg HTML-Datei, déi komplett offline fonctionnéiert. Si:\n\n• stellt keng Internetverbindung hier\n• schéckt keng Donnéeën un extern Servicer\n• huet keen Login a keen Benotzerkonto\n• späichert alles nëmmen lokal op Ärem Apparat\n\nEt ass en zougemaachent, selbststännegt Instrument.'
                    }
                ]
            },
            {
                section: 'FUNKTIOUNEN & BEDÉINUNG',
                items: [
                    {
                        q: 'Wéi ass d\'App opgebaut?',
                        a: 'D\'App huet dräi Haaptberäicher, duerch déi Dir Schrëtt fir Schrëtt navigéiert:\n\n1. Stammdaten – Numm, Gebuertsdatum, Schoul, Klass, Schouljoer an Aschätzungszäitraum (Trimester/Semester) aginn.\n2. ELDiB Auswäertung – Aschätzung an de véier Beräicher Verhalen, Kommunikatioun, Sozialisatioun a Kognitioun plus zousätzlech Ziler.\n3. Export – Fäerdeg Dokumenter als Word-Dateien eroflueden.'
                    },
                    {
                        q: 'Wéi fonctionnéiert d\'ELDiB-Aschätzung?',
                        a: 'An all Beräich (Verhalen, Kommunikatioun, Sozialisatioun, Kognitioun) sinn d\'ELDiB-Items no Stufen (I–V) organiséiert. Fir all Item wielt Dir:\n\n• Erreecht – D\'Kand weist dëst Verhalen reegelméisseg.\n• Net erreecht – D\'Verhalen gëtt nach net gewisen.\n• Zil – Dëst Verhalen gëtt als Fërderzil definéiert (max. 4 Ziler pro Beräich).\n\nWann all Items vun enger Stuf erreecht sinn, kënnt Dir déi ganz Stuf op eemol als „All erreecht" markéieren. Zu all Beräich kënnt Dir och Notizen hannerloossen.'
                    },
                    {
                        q: 'Wat sinn déi „Zousätzlech Ziler"?',
                        a: 'Nieft de véier ELDiB-Beräicher kënnt Dir zousätzlech Fërderziler aus sechs Kategorien auswielen: Démarches mentales, Manières d\'apprendre, Attitudes relationnelles, Attitudes affectives, Compétences essentielles a Culture et loisirs. Dës ginn och an d\'PEI-Dokument iwwerholl.'
                    },
                    {
                        q: 'Wéi eng Dokumenter kann ech exportéieren?',
                        a: 'Am Export-Beräich stinn Iech dräi Word-Dokumenter zur Verfügung:\n\n• Plan éducatif individualisé (PEI) – Enthält all ausgewielten Ziler mat Ech-Zilformuléierungen.\n• Complement – Enthält déi lescht 4 erreechten Items pro Beräich.\n• Diagnostic Spécialisé (DS) – Gëtt mat Platzhalter generéiert. D\'ELDiB-Raster an den Altersverglach ginn automatesch ausgefëllt, de Fléisstext ergänzt Dir manuell am Word-Dokument.'
                    },
                    {
                        q: 'Wéi gi meng Donnéeën gespäichert?',
                        a: 'D\'App späichert automatesch am Hannergrond. Zousätzlech:\n\n• De Späicher-Knäppchen (uewen riets) späichert manuell.\n• D\'Schüler-Iwwersiicht verwaltet méi Schüler:innen – Dir kënnt tëscht verschiddenen Aschätzunge wiesselen.\n\nWichteg: D\'Donnéeë leien am Browser-Späicher. Wann Dir de Browser-Cache läscht, gi d\'Donnéeë verluer. Luet bei Bedarf déi generéiert Word-Dokumenter erof – dat sinn Är dauerhaft Sécherung.'
                    },
                    {
                        q: 'Wat geschitt bei engem Browser- oder Cache-Wiessel?',
                        a: 'D\'Donnéeë sinn un de jeeweilege Browser gebonnen. Wann Dir de Browser wieselt oder de Cache läscht, sinn d\'Donnéeën net méi disponibel. Dofir ass et ugeroden, reegelméisseg déi generéiert Word-Dokumenter erofzelueden – dës sinn Är dauerhaft Sécherung.'
                    }
                ]
            }
        ];

        const children = [];

        // Title
        children.push(new Paragraph({
            children: [new TextRun({ text: 'FAQ – ELDiB Generator', bold: true, size: 36, color: '0097A7' })],
            heading: HeadingLevel.TITLE,
            alignment: AlignmentType.CENTER,
            spacing: { after: 100 }
        }));
        children.push(new Paragraph({
            children: [new TextRun({ text: 'Heefeg gestallte Froen zur Benotzung vun der App', italics: true, size: 22, color: '71717A' })],
            alignment: AlignmentType.CENTER,
            spacing: { after: 400 }
        }));

        for (const section of faqData) {
            // Section header
            children.push(new Paragraph({
                children: [new TextRun({ text: section.section, bold: true, size: 24, color: '0097A7' })],
                heading: HeadingLevel.HEADING_2,
                spacing: { before: 360, after: 200 },
                border: { bottom: { style: BorderStyle.SINGLE, size: 1, color: '0097A7', space: 4 } }
            }));

            for (const item of section.items) {
                // Question
                children.push(new Paragraph({
                    children: [new TextRun({ text: item.q, bold: true, size: 23 })],
                    spacing: { before: 240, after: 100 }
                }));

                // Answer
                const parts = item.a.split('\n\n');
                for (const part of parts) {
                    const lines = part.split('\n');
                    for (const line of lines) {
                        const isBullet = line.startsWith('\u2022 ');
                        const text = isBullet ? line.substring(2) : line;

                        if (isBullet) {
                            const dashIdx = text.indexOf(' \u2013 ');
                            const eIdx = dashIdx < 0 ? text.indexOf(' – ') : dashIdx;
                            if (eIdx > 0) {
                                children.push(new Paragraph({
                                    children: [
                                        new TextRun({ text: '\u2022  ', size: 21 }),
                                        new TextRun({ text: text.substring(0, eIdx), bold: true, size: 21 }),
                                        new TextRun({ text: text.substring(eIdx), size: 21 })
                                    ],
                                    spacing: { before: 40, after: 40 },
                                    indent: { left: 360 }
                                }));
                            } else {
                                children.push(new Paragraph({
                                    children: [new TextRun({ text: '\u2022  ' + text, size: 21 })],
                                    spacing: { before: 40, after: 40 },
                                    indent: { left: 360 }
                                }));
                            }
                        } else if (line.startsWith('Nee.')) {
                            children.push(new Paragraph({
                                children: [new TextRun({ text: line, bold: true, size: 22, color: '16A34A' })],
                                spacing: { before: 60, after: 60 }
                            }));
                        } else if (line.startsWith('Jo.')) {
                            children.push(new Paragraph({
                                children: [new TextRun({ text: line, bold: true, size: 22, color: '16A34A' })],
                                spacing: { before: 60, after: 60 }
                            }));
                        } else {
                            children.push(new Paragraph({
                                children: [new TextRun({ text: line, size: 21 })],
                                spacing: { before: 60, after: 60 }
                            }));
                        }
                    }
                }
            }
        }

        const doc = new Document({
            sections: [{
                properties: {
                    page: { margin: { top: 1200, bottom: 1200, left: 1200, right: 1200 } }
                },
                children
            }]
        });

        const blob = await Packer.toBlob(doc);
        saveAs(blob, 'FAQ_ELDiB_Generator.docx');

        document.getElementById('done').style.display = 'block';
        setTimeout(() => { document.getElementById('done').style.display = 'none'; }, 3000);
    }
    </script>
</body>
</html>
